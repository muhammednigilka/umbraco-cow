name: cms-deploy

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'deploy/Dockerfile'
      - '.dockerignore'
      - '.github/workflows/cms-deploy.yml'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: moofamily/umbraco
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:us-east-1:423623846645:service/moofamily-umbraco/d68cb6d66de344eda022de8f53f59a2b

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-cms-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger App Runner deployment
        run: |
          aws apprunner start-deployment --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" --region "${{ env.AWS_REGION }}"

      - name: Wait for App Runner to finish deploying
        run: |
          for i in $(seq 1 30); do
            S=$(aws apprunner describe-service --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" --region "${{ env.AWS_REGION }}" --query 'Service.Status' --output text)
            echo "[t+$((i*20))s] $S"
            if [ "$S" = "RUNNING" ]; then exit 0; fi
            if [ "$S" = "CREATE_FAILED" ] || [ "$S" = "DELETE_FAILED" ]; then exit 1; fi
            sleep 20
          done
          echo "Timed out waiting for service to reach RUNNING"
          exit 1
